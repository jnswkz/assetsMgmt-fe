<nav class="sidebar-nav" aria-label="Primary navigation">
  <a class="brand" routerLink="/dashboard" aria-label="AssetHub dashboard">
    <span class="brand__mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" focusable="false">
        <path d="M12 3.5 6 7v7l6 3.5 6-3.5V7l-6-3.5Z" />
        <path d="M12 10.5 6 7m6 3.5L18 7m-6 3.5v7" />
        <path d="m8.7 12.4-2.7 1.6m9.3-1.6 2.7 1.6M12 7v-3.5" />
      </svg>
    </span>
    <span class="brand__copy">
      <span class="brand__name">AssetHub</span>
      <span class="brand__tagline">IT Asset Management</span>
    </span>
  </a>

  <div class="nav-groups">
    @for (group of visibleGroups(); track group.label) {
      <section class="nav-group" [attr.aria-labelledby]="'nav-group-' + $index">
        <h2 class="nav-group__label" [id]="'nav-group-' + $index">{{ group.label }}</h2>

        <div class="nav-group__items">
          @for (item of group.items; track item.route) {
            <a
              class="nav-item"
              [routerLink]="item.route"
              routerLinkActive="nav-item--active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              <mat-icon class="nav-item__icon" aria-hidden="true">{{ item.icon }}</mat-icon>
              <span>{{ item.label }}</span>
            </a>
          }
        </div>
      </section>
    }
  </div>

  <div class="sidebar-nav__footer">
    <a class="nav-item nav-item--footer" [routerLink]="settingsItem.route" routerLinkActive="nav-item--active">
      <mat-icon class="nav-item__icon" aria-hidden="true">{{ settingsItem.icon }}</mat-icon>
      <span>{{ settingsItem.label }}</span>
    </a>
  </div>
</nav>
