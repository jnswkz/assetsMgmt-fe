@if (isLoginPage()) {
  <router-outlet></router-outlet>
} @else {
  <mat-sidenav-container class="app-shell">
    <mat-sidenav mode="side" opened class="app-sidenav">
      <app-sidebar-nav [role]="auth.role()"></app-sidebar-nav>
    </mat-sidenav>

    <mat-sidenav-content class="app-content" (click)="toggleThemeFromTopbar($event)">
      <router-outlet></router-outlet>
    </mat-sidenav-content>
  </mat-sidenav-container>
}
